<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BiliArm</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <!-- 浏览器工具栏弹窗：紧凑的快捷设置入口。 -->
    <main class="popup">
      <!-- UI 参考图要求的顶部品牌区域：名称、主题图标和 logo。 -->
      <header class="hero">
        <div>
          <h1>BiliArm</h1>
          <p>哔哩哔哩体验增强扩展</p>
        </div>
        <div class="hero-tools">
          <button id="themeToggle" class="theme-button" type="button" aria-label="切换深浅色主题" title="切换深浅色主题">☾</button>
          <img class="logo" src="../../assets/logo_example.png" alt="BiliArm logo">
        </div>
      </header>

      <!-- 简介文字块，无需打开完整设置页也能提供基本上下文。 -->
      <section class="panel intro-panel">
        <div>欢迎使用 BiliArm</div>
        <div class="intro-muted">首页净化、黑名单、播放器快捷键和观看增强。</div>
      </section>

      <!-- 四个快捷操作。popup.js 负责切换状态并更新视觉开关。 -->
      <section class="popup-section">
        <h2>快捷设置</h2>
        <button id="toggleEnabled" class="quick-button" type="button">
          <span>
            <strong>扩展总开关</strong>
            <small>开启或关闭所有增强功能。</small>
          </span>
          <span class="button-state"></span>
        </button>
        <button id="toggleClean" class="quick-button" type="button">
          <span>
            <strong>首页净化</strong>
            <small>过滤首页广告、直播和推广卡片。</small>
          </span>
          <span class="button-state"></span>
        </button>
        <button id="toggleHotkeys" class="quick-button" type="button">
          <span>
            <strong>播放器快捷键</strong>
            <small>控制扩展提供的快捷键功能。</small>
          </span>
          <span class="button-state"></span>
        </button>
        <button id="openOptions" class="quick-button" type="button">
          <span>
            <strong>更多设置</strong>
            <small>打开完整设置页进行细项调整。</small>
          </span>
          <span class="arrow">→</span>
        </button>
      </section>

      <!-- 版本号会在运行时由 popup.js 使用 manifest 元数据替换。 -->
      <footer class="footer">
        <span id="versionText">版本 0.2.0</span>
        <span>© 2026 Armoen软件</span>
      </footer>
    </main>

    <!-- 共享配置必须在 popup.js 前加载，确保快捷开关使用同一套结构。 -->
    <script src="../common/config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
