<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BiliArm 设置</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <!-- 完整设置页外壳：左侧导航保持可见，右侧内容随分类切换。 -->
    <main class="settings-shell">
      <!-- 分类导航和主题切换。导航按钮由 options.js 渲染。 -->
      <aside class="sidebar" aria-label="设置分类">
        <div class="brand-row">
          <div class="brand">BiliArm</div>
          <button id="themeToggle" class="theme-icon-button" type="button" aria-label="切换深浅色主题" title="切换深浅色主题">☾</button>
        </div>
        <nav id="navList" class="nav-list"></nav>
      </aside>

      <!-- 当前章节内容。options.js 根据声明式设置元数据填充 sectionBody。 -->
      <section class="content">
        <header class="content-header">
          <div>
            <h1 id="sectionTitle">基本设置</h1>
            <p id="sectionDescription">所有功能都可以单独开启或关闭。</p>
          </div>
          <label class="switch global-switch" title="扩展总开关">
            <input id="globalEnabled" type="checkbox" data-config="enabled">
            <span></span>
          </label>
        </header>

        <div id="sectionBody" class="section-body"></div>
      </section>
    </main>

    <!-- 快捷键编辑器。弹窗打开时由 options.js 捕获 keydown。 -->
    <dialog id="shortcutDialog" class="shortcut-dialog">
      <form method="dialog">
        <h2>修改快捷键</h2>
        <p id="shortcutDialogHelp">按下新的快捷键组合，或点击清空。</p>
        <kbd id="shortcutPreview">等待输入</kbd>
        <div class="dialog-actions">
          <button id="clearShortcut" type="button">清空</button>
          <button value="cancel">取消</button>
          <button id="saveShortcut" value="default">保存</button>
        </div>
      </form>
    </dialog>

    <!-- 黑名单导入按钮使用的隐藏文件输入框。 -->
    <input id="importFile" type="file" accept="application/json" hidden>

    <!-- 共享配置必须在设置页渲染器之前加载。 -->
    <script src="../common/config.js"></script>
    <script src="options.js"></script>
  </body>
</html>
